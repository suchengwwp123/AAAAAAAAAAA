server:
  port: ${PORT:9090}
  servlet:
    context-path: /api

spring:
  ai:
    ollama:
      base: http://localhost:11434
      chat:
        model: deepseek-r1:8b
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-REPLACED}
      base-url: https://api.deepseek.com/v1
      model: deepseek-chat
      chat:
        options:
          max-tokens: 3000
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:hosp}?allowPublicKeyRetrieval=true&useUnicode=true&useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:authority}
    password: ${MYSQL_PASSWORD:MYSQL_PASSWORD_OLD}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      test-while-idle: true
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 30000
      validation-query: select 'x'
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: false
      filters: stat,wall,slf4j
      max-pool-prepared-statement-per-connection-size: -1
      use-global-data-source-stat: true
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: /druid/*,*.js,*.gif,*.jpg,*.png,*.css,*.ico
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        reset-enable: false
        login-username: druid
        login-password: druid
        allow: 127.0.0.1
        deny:
  data:
    redis:
      url: ${REDIS_URL:}
      database: 0
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 10s
      lettuce:
        pool:
          max-active: 200
          max-wait: -1ms
          max-idle: 10
          min-idle: 0
  mail:
    host: smtp.qq.com
    username: 1874121406@qq.com
    password: vubvftwbyjndfddh
    port: 465
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          ssl:
            enable: true
            required: false

files:
  upload:
    path: /app/uploads/
    urlprefix: ${FILES_URL_PREFIX:http://localhost:9090/api/file/}
    outputquality: 1

alipay:
  appId: ${ALIPAY_APP_ID:9021000140662948}
  merchantPrivateKey: ${ALIPAY_PRIVATE_KEY:}
  alipayPublicKey: ${ALIPAY_PUBLIC_KEY:}
  notifyUrl: ${ALIPAY_NOTIFY_URL:https://accompany-api-luma-production.up.railway.app/api/alipay/notify}
